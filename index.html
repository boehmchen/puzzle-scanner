<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Puzzle Piece Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #0a0a0c;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a32;
    --text: #e8e6e3;
    --text2: #8b8990;
    --accent: #ff3b3b;
    --accent2: #ff6b4a;
    --found: #22c55e;
    --found2: #4ade80;
    --code: #f0c040;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    z-index: 10;
    background: var(--bg);
  }
  .header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--accent); }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-left: auto;
    transition: background 0.3s;
  }
  .status-dot.ready { background: var(--found); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Search bar */
  .search-bar {
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  .search-input {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-align: center;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 8px;
    color: var(--code);
    padding: 10px 16px;
    outline: none;
    max-width: 160px;
    transition: border-color 0.2s;
  }
  .search-input::placeholder {
    color: var(--text2);
    letter-spacing: 2px;
    font-size: 14px;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input.found { border-color: var(--found); }

  .search-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }
  .search-label {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .search-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text2);
  }

  /* Camera view */
  .camera-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #canvas-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* Detection overlay */
  .detection-banner {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    z-index: 5;
  }
  .detected-codes {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .code-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    transition: all 0.15s;
  }
  .code-chip.target {
    background: var(--found);
    color: #000;
    border-color: var(--found);
    transform: scale(1.15);
    box-shadow: 0 0 20px rgba(34,197,94,0.5);
  }
  .code-chip .chip-id {
    font-size: 10px;
    color: var(--text2);
    margin-left: 6px;
  }
  .code-chip.target .chip-id { color: rgba(0,0,0,0.5); }

  /* Found flash */
  .found-flash {
    position: absolute;
    inset: 0;
    background: rgba(34,197,94,0.15);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 4;
  }
  .found-flash.active { opacity: 1; }

  /* Loading state */
  .loading-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 20;
    gap: 16px;
    transition: opacity 0.4s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loader {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 13px;
    color: var(--text2);
  }

  /* Bottom stats */
  .stats-bar {
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    background: var(--bg);
    border-top: 1px solid var(--border);
    z-index: 10;
  }

  /* Alphabet reference */
  .alpha-ref {
    font-size: 9px;
    color: var(--text2);
    text-align: center;
    padding: 4px 16px 6px;
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    line-height: 1.4;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>&#9638;</span> puzzle scanner</h1>
  <div class="status-dot" id="statusDot"></div>
</div>

<div class="search-bar">
  <input type="text"
         class="search-input"
         id="searchInput"
         placeholder="K7"
         maxlength="2"
         autocomplete="off"
         autocapitalize="characters"
         spellcheck="false">
  <div class="search-info">
    <div class="search-label">Searching for</div>
    <div class="search-id" id="searchIdDisplay">type a code...</div>
  </div>
</div>

<div class="camera-container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas-overlay"></canvas>
  <div class="found-flash" id="foundFlash"></div>
  <div class="detection-banner">
    <div class="detected-codes" id="detectedCodes"></div>
  </div>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader"></div>
    <div class="loading-text" id="loadingText">Loading OpenCV.js...</div>
  </div>
</div>

<div class="stats-bar">
  <span id="fpsDisplay">-- fps</span>
  <span id="detectCount">0 detected</span>
  <span id="totalScanned">0 scanned</span>
</div>

<div class="alpha-ref">
  1 2 3 4 5 6 7 8 9 A B C D E F G H J K L M N P Q R T U V W X Y Z
</div>

<script>
// --- Alphabet mapping ---
const ALPHABET = '123456789ABCDEFGHJKLMNPQRTUVWXYZ'.split('');
const CHAR_TO_IDX = {};
ALPHABET.forEach((c, i) => CHAR_TO_IDX[c] = i);

function idToCode(id) {
  if (id < 0 || id >= 1024) return '??';
  return ALPHABET[Math.floor(id / 32)] + ALPHABET[id % 32];
}

function codeToId(code) {
  if (!code || code.length !== 2) return -1;
  const c1 = code[0].toUpperCase();
  const c2 = code[1].toUpperCase();
  if (!(c1 in CHAR_TO_IDX) || !(c2 in CHAR_TO_IDX)) return -1;
  return CHAR_TO_IDX[c1] * 32 + CHAR_TO_IDX[c2];
}

// --- State ---
let targetCode = '';
let targetId = -1;
let totalScanned = new Set();
let lastDetected = [];
let fps = 0;
let frameCount = 0;
let lastFpsTime = performance.now();
let cvReady = false;

// --- DOM refs ---
const video = document.getElementById('video');
const canvasOverlay = document.getElementById('canvas-overlay');
const ctx = canvasOverlay.getContext('2d');
const searchInput = document.getElementById('searchInput');
const searchIdDisplay = document.getElementById('searchIdDisplay');
const detectedCodesEl = document.getElementById('detectedCodes');
const foundFlash = document.getElementById('foundFlash');
const statusDot = document.getElementById('statusDot');
const loadingOverlay = document.getElementById('loadingOverlay');
const loadingText = document.getElementById('loadingText');
const fpsDisplay = document.getElementById('fpsDisplay');
const detectCountEl = document.getElementById('detectCount');
const totalScannedEl = document.getElementById('totalScanned');

// --- Search input ---
searchInput.addEventListener('input', (e) => {
  let val = e.target.value.toUpperCase().replace(/[^123456789ABCDEFGHJKLMNPQRTUVWXYZ]/g, '');
  e.target.value = val;
  targetCode = val;
  targetId = codeToId(val);
  searchInput.classList.remove('found');

  if (val.length === 2 && targetId >= 0) {
    searchIdDisplay.textContent = `ArUco ID: ${targetId}`;
  } else if (val.length === 1) {
    searchIdDisplay.textContent = `row ${val}...`;
  } else {
    searchIdDisplay.textContent = 'type a code...';
  }
});

// --- Camera setup ---
async function startCamera() {
  loadingText.textContent = 'Starting camera...';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment',
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        focusMode: { ideal: 'continuous' }
      }
    });
    video.srcObject = stream;
    await video.play();

    canvasOverlay.width = video.videoWidth;
    canvasOverlay.height = video.videoHeight;
  } catch (err) {
    loadingText.textContent = 'Camera access denied. Please allow camera.';
    console.error(err);
  }
}

// --- Persistent OpenCV objects (created once, reused every frame) ---
let arucoDict = null;
let arucoParams = null;
let cap = null;
let srcMat = null;
let grayMat = null;

function initDetector() {
  arucoDict = cv.aruco.getPredefinedDictionary(cv.aruco.DICT_4X4_1000);
  arucoParams = new cv.aruco.DetectorParameters();

  // Tune for phone cameras
  arucoParams.adaptiveThreshWinSizeMin = 3;
  arucoParams.adaptiveThreshWinSizeMax = 30;
  arucoParams.adaptiveThreshWinSizeStep = 5;
  arucoParams.adaptiveThreshConstant = 7;
  arucoParams.minMarkerPerimeterRate = 0.01;
  arucoParams.maxMarkerPerimeterRate = 4.0;
  arucoParams.polygonalApproxAccuracyRate = 0.05;
  arucoParams.minCornerDistanceRate = 0.05;
  arucoParams.minDistanceToBorder = 1;
  arucoParams.cornerRefinementMethod = cv.aruco.CORNER_REFINE_SUBPIX;

  cap = new cv.VideoCapture(video);
}

// --- OpenCV detection loop ---
function detectMarkers() {
  if (!cvReady || video.readyState < 2) {
    requestAnimationFrame(detectMarkers);
    return;
  }

  const w = video.videoWidth;
  const h = video.videoHeight;

  if (canvasOverlay.width !== w) canvasOverlay.width = w;
  if (canvasOverlay.height !== h) canvasOverlay.height = h;

  // Allocate persistent mats on first frame or if resolution changes
  if (!srcMat || srcMat.rows !== h || srcMat.cols !== w) {
    if (srcMat) srcMat.delete();
    if (grayMat) grayMat.delete();
    srcMat = new cv.Mat(h, w, cv.CV_8UC4);
    grayMat = new cv.Mat();
  }

  const corners = new cv.MatVector();
  const ids = new cv.Mat();

  try {
    cap.read(srcMat);
    cv.cvtColor(srcMat, grayMat, cv.COLOR_RGBA2GRAY);

    // Enhance contrast with CLAHE for better detection in varying lighting
    const clahe = new cv.CLAHE(2.0, new cv.Size(8, 8));
    clahe.apply(grayMat, grayMat);
    clahe.delete();

    cv.aruco.detectMarkers(grayMat, arucoDict, corners, ids, arucoParams);

    // Clear overlay
    ctx.clearRect(0, 0, w, h);

    const detected = [];
    const numMarkers = ids.rows;

    for (let i = 0; i < numMarkers; i++) {
      const markerId = ids.intAt(i, 0);
      const code = idToCode(markerId);
      detected.push({ id: markerId, code });
      totalScanned.add(markerId);

      // Get corner points
      const c = corners.get(i);
      const pts = [];
      for (let j = 0; j < 4; j++) {
        pts.push({
          x: c.floatAt(0, j * 2),
          y: c.floatAt(0, j * 2 + 1)
        });
      }

      const isTarget = targetCode.length === 2 && markerId === targetId;

      // Draw outline
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let j = 1; j < 4; j++) ctx.lineTo(pts[j].x, pts[j].y);
      ctx.closePath();
      ctx.lineWidth = isTarget ? 4 : 2;
      ctx.strokeStyle = isTarget ? '#22c55e' : '#ff3b3b';
      ctx.stroke();

      if (isTarget) {
        ctx.fillStyle = 'rgba(34,197,94,0.15)';
        ctx.fill();
      }

      // Draw code label
      const cx = (pts[0].x + pts[2].x) / 2;
      const fontSize = Math.max(14, Math.abs(pts[1].x - pts[0].x) * 0.5);

      ctx.font = `bold ${fontSize}px 'JetBrains Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Background pill
      const metrics = ctx.measureText(code);
      const pw = metrics.width + 12;
      const ph = fontSize + 8;
      const labelY = pts[0].y - ph - 4;

      ctx.fillStyle = isTarget ? '#22c55e' : 'rgba(10,10,12,0.85)';
      ctx.beginPath();
      ctx.roundRect(cx - pw/2, labelY - ph/2, pw, ph, 4);
      ctx.fill();

      ctx.fillStyle = isTarget ? '#000' : '#fff';
      ctx.fillText(code, cx, labelY);

      c.delete();
    }

    // Update detected chips
    lastDetected = detected;
    updateDetectedUI(detected);

    // Found flash
    if (targetCode.length === 2 && detected.some(d => d.id === targetId)) {
      foundFlash.classList.add('active');
      searchInput.classList.add('found');
    } else {
      foundFlash.classList.remove('active');
      if (targetCode.length === 2) searchInput.classList.remove('found');
    }

    // FPS
    frameCount++;
    const now = performance.now();
    if (now - lastFpsTime >= 1000) {
      fps = frameCount;
      frameCount = 0;
      lastFpsTime = now;
      fpsDisplay.textContent = `${fps} fps`;
    }

    detectCountEl.textContent = `${numMarkers} detected`;
    totalScannedEl.textContent = `${totalScanned.size} scanned`;
  } catch (e) {
    console.error('Detection error:', e);
  }

  corners.delete();
  ids.delete();

  requestAnimationFrame(detectMarkers);
}

function updateDetectedUI(detected) {
  if (detected.length === 0) {
    detectedCodesEl.innerHTML = '<span style="color:var(--text2);font-size:12px;">Point camera at markers...</span>';
    return;
  }

  // Sort: target first, then by ID
  detected.sort((a, b) => {
    if (a.id === targetId) return -1;
    if (b.id === targetId) return 1;
    return a.id - b.id;
  });

  detectedCodesEl.innerHTML = detected.map(d => {
    const isTarget = targetCode.length === 2 && d.id === targetId;
    return `<div class="code-chip ${isTarget ? 'target' : ''}">${d.code}<span class="chip-id">#${d.id}</span></div>`;
  }).join('');
}

// --- Load OpenCV.js ---
function onOpenCvReady() {
  cvReady = true;
  initDetector();
  statusDot.classList.add('ready');
  loadingOverlay.classList.add('hidden');
  detectMarkers();
}

window.onOpenCvReady = onOpenCvReady;

async function init() {
  await startCamera();
  loadingText.textContent = 'Loading OpenCV.js (may take a moment)...';

  const script = document.createElement('script');
  script.src = 'https://docs.opencv.org/4.10.0/opencv.js';
  script.async = true;
  script.onload = () => {
    if (typeof cv !== 'undefined') {
      if (cv.getBuildInformation) {
        onOpenCvReady();
      } else {
        cv['onRuntimeInitialized'] = onOpenCvReady;
      }
    }
  };
  script.onerror = () => {
    loadingText.textContent = 'Failed to load OpenCV.js. Check connection.';
  };
  document.head.appendChild(script);
}

init();
</script>
</body>
</html>
